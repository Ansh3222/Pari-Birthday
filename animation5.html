<!DOCTYPE html>
<html>
<head>
<title>Birthday Gift Surprise 🎁</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#ff758c,#ffb199);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:cursive;
}

.gift{
    font-size:130px;
    cursor:pointer;
    animation:shake 1s infinite;
}

@keyframes shake{
    50%{
        transform:rotate(10deg);
    }
}

.cake{
    font-size:100px;
    display:none;
    animation:pop 1s;
}

h1,h2{
    color:white;
    display:none;
    text-align:center;
    text-shadow:0 0 15px red;
}

@keyframes pop{
    from{
        transform:scale(0);
    }
    to{
        transform:scale(1);
    }
}

.balloon{
    position:absolute;
    font-size:60px;
    bottom:-100px;
    animation:fly 5s infinite;
}

.b1{left:10%;}
.b2{right:10%;}
.b3{left:45%;}

@keyframes fly{
    to{
        bottom:100%;
    }
}

button{
    padding:12px 25px;
    border:0;
    border-radius:30px;
    font-size:18px;
    display:none;
}

</style>
</head>

<body>

<audio id="song">
<source src="birthday.mp3" type="audio/mpeg">
</audio>


<div class="gift" onclick="openGift()">🎁</div>

<div class="cake">🎂</div>

<h1 id="wish">Happy Birthday Ansh ❤️</h1>
<h2 id="msg">Wishing you lots of happiness and success 🎉</h2>


<div class="balloon b1">🎈</div>
<div class="balloon b2">🎈</div>
<div class="balloon b3">🎈</div>
<div class="balloon b4">🎈</div>
<div class="balloon b4">🎈</div>
<div class="balloon b5">🎈</div>


<button id="btn" onclick="playSong()">🎵 Play Song</button>


<script>

function openGift(){

document.querySelector(".gift").style.display="none";

document.querySelector(".cake").style.display="block";

document.getElementById("wish").style.display="block";

document.getElementById("msg").style.display="block";

document.getElementById("btn").style.display="block";

}


function playSong(){
document.getElementById("song").play();
}

</script>

</body>
</html>
